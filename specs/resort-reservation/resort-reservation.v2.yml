## -------------------------------------------------------
## 리조트 예약 시스템 — 기능 명세 (v2)
## 원본: spec-requests/resort-reservation/resort-reservation.v2.md
## 자료: spec-requests/resort-reservation/design_handoff_byul_resort/
##       (Byul Resort Version A — Hi-fi JSX 프로토타입, Tailwind 재구성)
## -------------------------------------------------------

project:
  id: resort-reservation
  name: 리조트 예약 시스템
  description: 리조트 객실 예약 시스템 (user + admin, 일자별 재고/회원유형별 요금, 다박 예약)
  version: 2

  modules:
    frontend:
      - key: user
        port: 5176
        template: user
        ui_source: spec-requests/resort-reservation/design_handoff_byul_resort/
        proxy_target: user
      - key: admin
        port: 5179
        template: admin
        proxy_target: admin

    backend:
      strategy: split
      apps:
        - { key: user,  port: 8081 }
        - { key: admin, port: 8084 }

    database:
      strategy: shared
      shared_owner: user

  database:
    name: resortdb

## -------------------------------------------------------
## 0. 파일 업로드 정책 (harness/files.md 재정의)
## -------------------------------------------------------
files:
  max_size_mb: 10
  allowed_mime: ["image/png", "image/jpeg", "image/webp"]
  upload_auth: true
  download_auth: false

## -------------------------------------------------------
## 1. changelog
## -------------------------------------------------------
changelog:
  - version: 2
    date: 2026-04-21
    generation: 신규 생성 (v2)
    changes:
      - 어드민 모듈 신규 추가 (Case 3 — split backend + shared DB, shared_owner=user)
      - 사용자/관리자 테이블 분리 — role 컬럼 제거, Member(user) / AdminUser(admin) + 세션 쿠키 분리(USER_SID/ADMIN_SID)
      - 사용자 프론트 디자인 리뉴얼 (Byul Resort Version A, Tailwind 재구성)
      - 일자별 재고 도입 (RoomInventory)
      - 일자별 + 회원유형별 요금 도입 (RoomDailyPrice), 회원유형 무관 기본가 Room.default_price
      - 예약 다박 허용 (1~7박), 오늘 ~ +6개월, 성인/어린이 인원 분리
      - 예약 일자별 요금 스냅샷 저장 (ReservationDailyPrice)
      - 예약 플로우 2-step (날짜·인원 → 투숙객). 결제 Step 없음
      - 객실 이미지 확장 — 썸네일 1장 + 갤러리 최대 5장 (공통 파일업로드)
      - 공지사항(Notice) 신규 추가 — user 조회 / admin CRUD
      - 객실 메타 확장 — 카테고리/영문명/설명/침대/크기/인원/전망/뱃지/어메니티
      - v1 의 RoomPrice(회원유형별 고정가) 폐기 → default_price + RoomDailyPrice 로 대체
  - version: 1
    date: 2026-04-16
    generation: 신규 생성
    changes:
      - 초기 버전 (회원가입, 로그인, 객실 조회, 객실 예약, 예약 확인)
      - 회원 유형(일반/분양) 분기 및 회원별 객실/요금 차등 규칙

## -------------------------------------------------------
## 2. 엔티티
## -------------------------------------------------------
##
## 주의:
##   - StoredFile / CodeGroup / CodeItem 은 공통 하네스 규칙에 의해 자동 주입 (명시하지 않음)
##     * harness/files.md, harness/common-code.md 참조
##   - split backend + shared DB 이므로 shared_owner(user) 가 DDL 주도권.
##     admin 백엔드는 ddl-auto=validate 로 동일 스키마를 읽는다.
##   - Member 는 user 백엔드만 코드 보유, AdminUser 는 admin 백엔드만 코드 보유.
##     그 외 도메인(Room, Reservation, Notice, RoomInventory, ...) 은 양쪽 백엔드 모두에
##     엔티티 복제 생성 — 각 백엔드의 Service 에서 필요한 API 만 노출한다.
##
entities:

  ## ==== 사용자 계정 (user 백엔드 전용) ====
  Member:
    table: member
    description: 일반 사용자 (일반 / 분양 회원). user 백엔드에서만 관리
    backend_scope: [user]
    fields:
      - { name: member_id,         type: Long,      pk: true, auto: true }
      - { name: login_id,          type: String,    required: true, unique: true, label: 아이디 }
      - { name: password,          type: String,    required: true, min: 8, label: 비밀번호 }
      - { name: member_name,       type: String,    required: true, label: 이름 }
      - { name: phone,             type: String,    required: true, label: 연락처 }
      - { name: email,             type: String,    required: false, label: 이메일 }
      - { name: parcel_member_no,  type: String,    required: false, label: 분양회원번호 }
      - { name: member_type,       type: Enum,      enum: MemberType, derived: true, label: 회원유형 }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    enums:
      MemberType: [GENERAL, PARCEL]   # 일반, 분양
    derived_rules:
      member_type: "parcel_member_no 가 존재하면 PARCEL, 없으면 GENERAL"
    validations:
      - { field: login_id, rule: unique,  message: 이미 사용 중인 아이디입니다 }
      - { field: password, rule: "min:8", message: 비밀번호는 8자리 이상이어야 합니다 }
      - { field: password, rule: "regex:^(?=.*[a-zA-Z])(?=.*\\d).+$", message: 비밀번호는 영문과 숫자를 포함해야 합니다 }
      - { field: phone,    rule: "regex:^01[016789]-?\\d{3,4}-?\\d{4}$", message: 연락처 형식이 올바르지 않습니다 }
      - { field: email,    rule: email,   message: 이메일 형식이 올바르지 않습니다, when: provided }
      # parcel_member_no 는 입력 여부만 판단 (별도 형식 검증 없음)

  ## ==== 관리자 계정 (admin 백엔드 전용) ====
  AdminUser:
    table: admin_user
    description: 관리자 계정. admin 백엔드에서만 관리 (Member 와 별도 테이블)
    backend_scope: [admin]
    fields:
      - { name: admin_user_id, type: Long,      pk: true, auto: true }
      - { name: login_id,      type: String,    required: true, unique: true, label: 아이디 }
      - { name: password,      type: String,    required: true, min: 8, label: 비밀번호 }
      - { name: admin_name,    type: String,    required: true, label: 이름 }
      - { name: created_at,    type: Timestamp, auto: true, audit: true }
      - { name: updated_at,    type: Timestamp, auto: true, audit: true }
    validations:
      - { field: login_id, rule: unique,  message: 이미 사용 중인 아이디입니다 }
      - { field: password, rule: "min:8", message: 비밀번호는 8자리 이상이어야 합니다 }

  ## ==== 객실 ====
  Room:
    table: room
    description: 객실 마스터 (기본 정보 + 기본 재고/요금 fallback)
    fields:
      - { name: room_id,            type: Long,      pk: true, auto: true }
      - { name: room_code,          type: String,    required: true, unique: true, label: 객실코드 }
      - { name: room_name,          type: String,    required: true, label: 객실명 }
      - { name: en_name,            type: String,    required: false, label: 영문명 }
      - { name: category_code_id,   type: Long,      fk: CodeItem, required: true, code_group: ROOM_CATEGORY, label: 카테고리 }
      - { name: description,        type: String,    required: false, lob: true, label: 소개 }
      - { name: bed,                type: String,    required: false, label: 침대 }
      - { name: size_sqm,           type: Integer,   required: false, label: 크기(㎡) }
      - { name: capacity,           type: Integer,   required: true, default: 2, label: 최대 인원 }
      - { name: view_name,          type: String,    required: false, label: 전망 }
      - { name: default_stock,      type: Integer,   required: true, default: 0, label: 기본 재고 }
      - { name: default_price,      type: Integer,   required: true, default: 0, label: 기본 요금(회원유형 무관) }
      - { name: thumbnail_file_id,  type: Long,      fk: StoredFile, required: false, label: 리스트 썸네일 }
      - { name: badge_code_id,      type: Long,      fk: CodeItem, required: false, code_group: ROOM_BADGE, label: 뱃지 }
      - { name: is_active,          type: Boolean,   required: true, default: true, label: 노출 여부 }
      - { name: created_at,         type: Timestamp, auto: true, audit: true }
      - { name: updated_at,         type: Timestamp, auto: true, audit: true }
    relations:
      - { entity: RoomImage,       type: one-to-many, mapped_by: room }
      - { entity: RoomAmenity,     type: one-to-many, mapped_by: room }
      - { entity: RoomInventory,   type: one-to-many, mapped_by: room }
      - { entity: RoomDailyPrice,  type: one-to-many, mapped_by: room }
      - { entity: RoomPermission,  type: one-to-many, mapped_by: room }

  ## ==== 객실 갤러리 (최대 5장) ====
  RoomImage:
    table: room_image
    description: 객실 상세 갤러리 (thumbnail 은 Room.thumbnail_file_id 별도)
    fields:
      - { name: room_image_id, type: Long,      pk: true, auto: true }
      - { name: room_id,       type: Long,      fk: Room, required: true }
      - { name: image_file_id, type: Long,      fk: StoredFile, required: true, label: 이미지 }
      - { name: sort_order,    type: Integer,   required: true, default: 0, label: 노출 순서 }
      - { name: created_at,    type: Timestamp, auto: true, audit: true }
      - { name: updated_at,    type: Timestamp, auto: true, audit: true }
    business_rules:
      - 객실당 최대 5장 (Service 레이어에서 검증)

  ## ==== 객실 어메니티 (CodeItem 매핑) ====
  RoomAmenity:
    table: room_amenity
    description: 객실별 편의시설 (free-wifi/pool/spa/parking/breakfast 등)
    fields:
      - { name: room_amenity_id, type: Long,      pk: true, auto: true }
      - { name: room_id,         type: Long,      fk: Room, required: true }
      - { name: amenity_code_id, type: Long,      fk: CodeItem, required: true, code_group: ROOM_AMENITY, label: 편의시설 }
      - { name: created_at,      type: Timestamp, auto: true, audit: true }
      - { name: updated_at,      type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, amenity_code_id]

  ## ==== 객실 일자별 재고 ====
  RoomInventory:
    table: room_inventory
    description: 객실 일자별 재고. 해당 일자 행이 없으면 Room.default_stock 로 fallback
    fields:
      - { name: room_inventory_id, type: Long,      pk: true, auto: true }
      - { name: room_id,           type: Long,      fk: Room, required: true }
      - { name: stay_date,         type: LocalDate, required: true, label: 일자 }
      - { name: stock_count,       type: Integer,   required: true, default: 0, label: 재고 }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, stay_date]
    business_rules:
      - 예약 확정 시 해당 기간 각 일자의 stock_count -= 1
      - 행이 없으면 Room.default_stock 으로 간주 (확정 시에는 행을 생성하여 차감)
      - 예약 취소 시 해당 기간 각 일자의 stock_count += 1

  ## ==== 객실 일자별 + 회원유형별 요금 ====
  RoomDailyPrice:
    table: room_daily_price
    description: 객실 일자별 + 회원유형별 요금. 해당 (일자, 회원유형) 행이 없으면 Room.default_price 로 fallback
    fields:
      - { name: room_daily_price_id, type: Long,      pk: true, auto: true }
      - { name: room_id,             type: Long,      fk: Room, required: true }
      - { name: stay_date,           type: LocalDate, required: true, label: 일자 }
      - { name: member_type,         type: Enum,      enum: MemberType, required: true, label: 회원유형 }
      - { name: price,               type: Integer,   required: true, label: 금액 }
      - { name: created_at,          type: Timestamp, auto: true, audit: true }
      - { name: updated_at,          type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, stay_date, member_type]
    business_rules:
      - 가격 계산 시 우선순위 — RoomDailyPrice(room, date, memberType) > Room.default_price
      - default_price 는 회원유형 무관 단일값

  ## ==== 객실 예약 가능 회원유형 ====
  RoomPermission:
    table: room_permission
    description: 객실이 허용하는 회원유형 (일반/분양)
    fields:
      - { name: room_permission_id, type: Long,      pk: true, auto: true }
      - { name: room_id,            type: Long,      fk: Room, required: true }
      - { name: member_type,        type: Enum,      enum: MemberType, required: true, label: 예약가능 회원유형 }
      - { name: created_at,         type: Timestamp, auto: true, audit: true }
      - { name: updated_at,         type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, member_type]

  ## ==== 예약 ====
  Reservation:
    table: reservation
    description: 예약 (1예약 = 1객실, 1~7박)
    fields:
      - { name: reservation_id,      type: Long,      pk: true, auto: true }
      - { name: reservation_no,      type: String,    unique: true, auto: true, label: 예약번호 }
      - { name: member_id,           type: Long,      fk: Member, required: true }
      - { name: room_id,             type: Long,      fk: Room, required: true }
      - { name: check_in_date,       type: LocalDate, required: true, label: 체크인 }
      - { name: check_out_date,      type: LocalDate, required: true, label: 체크아웃 }
      - { name: nights,              type: Integer,   required: true, label: 박수 }
      - { name: adults,              type: Integer,   required: true, default: 2, label: 성인 }
      - { name: children,            type: Integer,   required: true, default: 0, label: 어린이 }
      - { name: guest_name,          type: String,    required: true, label: 투숙자명 }
      - { name: guest_phone,         type: String,    required: true, label: 투숙자 연락처 }
      - { name: special_request,     type: String,    required: false, lob: true, label: 요청사항 }
      - { name: member_type_applied, type: Enum,      enum: MemberType, required: true, label: 적용된 회원유형 }
      - { name: total_price,         type: Integer,   required: true, label: 총 결제 금액 }
      - { name: status,              type: Enum,      enum: ReservationStatus, default: CONFIRMED, label: 예약상태 }
      - { name: reservation_date,    type: LocalDate, auto: true, label: 예약일자 }
      - { name: created_at,          type: Timestamp, auto: true, audit: true }
      - { name: updated_at,          type: Timestamp, auto: true, audit: true }
    enums:
      ReservationStatus: [CONFIRMED, CANCELLED]   # 확정, 취소
    relations:
      - { entity: ReservationDailyPrice, type: one-to-many, mapped_by: reservation }
    business_rules:
      - 로그인한 Member 만 예약 생성 가능
      - 1 ≤ nights ≤ 7, check_out_date - check_in_date == nights
      - check_in_date 는 오늘 ~ today + 6months 범위
      - adults ≥ 1, adults + children ≤ Room.capacity
      - 예약 확정 시 해당 기간 각 일자의 RoomInventory.stock_count -= 1 (없으면 default_stock 기반 행 생성 후 차감)
      - 예약 취소 시 해당 기간 각 일자의 stock_count += 1
      - reservation_no 포맷 — `BR-YYYYMMDD-NNNN` (디자인 예시 준수)
    validations:
      - { rule: room_permission,    message: "해당 객실은 회원 유형에 따라 예약이 불가합니다" }
      - { rule: stock_available,    message: "선택한 기간 중 재고가 부족한 날짜가 있습니다" }
      - { rule: date_range,         message: "체크인은 오늘 ~ 6개월 이내, 체크아웃은 체크인 이후 최대 7박까지 가능합니다" }
      - { rule: capacity,           message: "선택한 인원이 객실 최대 수용 인원을 초과합니다" }

  ## ==== 예약 일자별 요금 스냅샷 ====
  ReservationDailyPrice:
    table: reservation_daily_price
    description: 예약 시점의 일자별 요금 스냅샷 (후일 가격 변경 무관하게 예약 이력 보존)
    fields:
      - { name: reservation_daily_price_id, type: Long,      pk: true, auto: true }
      - { name: reservation_id,             type: Long,      fk: Reservation, required: true }
      - { name: stay_date,                  type: LocalDate, required: true, label: 일자 }
      - { name: price,                      type: Integer,   required: true, label: 금액 }
      - { name: created_at,                 type: Timestamp, auto: true, audit: true }
      - { name: updated_at,                 type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [reservation_id, stay_date]

  ## ==== 공지사항 ====
  Notice:
    table: notice
    description: 공지사항 (공지 / 이벤트 / 시설)
    fields:
      - { name: notice_id,        type: Long,      pk: true, auto: true }
      - { name: title,            type: String,    required: true, label: 제목 }
      - { name: category_code_id, type: Long,      fk: CodeItem, required: true, code_group: NOTICE_CATEGORY, label: 분류 }
      - { name: content,          type: String,    required: true, lob: true, label: 내용 }
      - { name: is_pinned,        type: Boolean,   required: true, default: false, label: 상단 고정 }
      - { name: view_count,       type: Integer,   required: true, default: 0, label: 조회수 }
      - { name: created_at,       type: Timestamp, auto: true, audit: true }
      - { name: updated_at,       type: Timestamp, auto: true, audit: true }
    business_rules:
      - 사용자 리스트 노출은 is_pinned=true 먼저, 그 다음 created_at DESC
      - 사용자 상세 조회 시 view_count += 1

## -------------------------------------------------------
## 3. 공통 코드 seed (harness/common-code.md)
## -------------------------------------------------------
code_groups:
  - group_key: ROOM_CATEGORY
    label: 객실 카테고리
    items:
      - { key: SUITE,    label: 스위트,   sort_order: 10 }
      - { key: VILLA,    label: 빌라,     sort_order: 20 }
      - { key: DELUXE,   label: 디럭스,   sort_order: 30 }
      - { key: FAMILY,   label: 패밀리,   sort_order: 40 }
      - { key: STANDARD, label: 스탠다드, sort_order: 50 }

  - group_key: ROOM_BADGE
    label: 객실 뱃지
    items:
      - { key: BEST,      label: 베스트,   sort_order: 10 }
      - { key: SIGNATURE, label: 시그니처, sort_order: 20 }
      - { key: NEW,       label: 신규,     sort_order: 30 }

  - group_key: ROOM_AMENITY
    label: 객실 편의시설
    items:
      - { key: FREE_WIFI, label: 무료 Wi-Fi, sort_order: 10 }
      - { key: POOL,      label: 수영장,     sort_order: 20 }
      - { key: SPA,       label: 스파,       sort_order: 30 }
      - { key: PARKING,   label: 무료 주차,  sort_order: 40 }
      - { key: BREAKFAST, label: 조식 포함,  sort_order: 50 }

  - group_key: NOTICE_CATEGORY
    label: 공지 분류
    items:
      - { key: NOTICE,   label: 공지,   sort_order: 10 }
      - { key: EVENT,    label: 이벤트, sort_order: 20 }
      - { key: FACILITY, label: 시설,   sort_order: 30 }

## -------------------------------------------------------
## 4. Seed 데이터
## -------------------------------------------------------
