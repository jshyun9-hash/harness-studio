## -------------------------------------------------------
## 7. 권한 / 인증
## -------------------------------------------------------
##
## 주의:
##   - v2 는 role 컬럼을 사용하지 않는다 — 테이블/세션 분리로 경계 확보.
##   - user 백엔드: Member 세션 (쿠키 USER_SID). admin 백엔드: AdminUser 세션 (쿠키 ADMIN_SID).
##   - 같은 브라우저에서 두 세션 동시 존재 가능.
##   - 각 백엔드는 SessionAuthFilter 하나씩 (role 체크 불필요, 세션 존재 여부 + 대상 테이블 조회만).
##
auth:
  method: session

  user:
    entity: Member
    session_cookie: USER_SID
    login_path: /login
    public_pages:
      - /
      - /signup
      - /login
      - /rooms/:id        # 비로그인 진입 시 프론트가 /login 으로 리다이렉트
      - /rooms            # 동일
      - /notices
      - /notices/:id
    protected_pages:
      - /booking/:roomId
      - /booking/complete/:reservationNo
      - /mypage
    rule: |
      비로그인 사용자가 protected 페이지 접근 시 /login 으로 리다이렉트 (redirectTo query 로 원 경로 보존).
      메인(/) 은 public 이지만 /rooms, /rooms/:id 는 검색 제출/상세 클릭 시 비로그인이면 /login 으로 이동.

  admin:
    entity: AdminUser
    session_cookie: ADMIN_SID
    login_path: /login
    public_pages:
      - /login
    protected_pages: ["**"]
    rule: 비로그인 AdminUser 는 /login 으로 리다이렉트

## -------------------------------------------------------
## 8. 핵심 비즈니스 로직 요약
## -------------------------------------------------------
business_rules:
  # 계정
  - parcel_member_no 존재 → member_type=PARCEL, 없으면 GENERAL (형식 검증 없음, 입력 여부만 판단)
  - 관리자는 AdminUser 테이블로만 관리. Member 와 별도 (role 컬럼 없음)
  - user / admin 세션은 쿠키 이름 분리 (USER_SID / ADMIN_SID)

  # 요금 / 재고 fallback
  - 가격 우선순위 — RoomDailyPrice(room, date, memberType) > Room.default_price
  - 재고 우선순위 — RoomInventory(room, date) > Room.default_stock
  - default_price 는 회원유형 무관 단일값 (관리자가 지정)

  # 메인 / 리스트 / 상세
  - 메인(/) 은 public, default_price 기준으로 객실 노출
  - 메인 기본 검색 프리셋 — 오늘 체크인 / 내일 체크아웃 / 성인 2 / 어린이 0
  - 검색 제출 or 객실 카드 클릭 시 비로그인이면 /login 으로 (redirectTo 보존), 로그인이면 /rooms 또는 /rooms/:id 로
  - /rooms, /rooms/:id 는 조건+회원유형 기반으로 재고/가격/권한 검증. 불충족 객실은 리스트에서 제외, 상세에서는 메인 복귀
  - 다박(nights ≥ 2) 이면 상세/예약 화면에 일자별 요금 표시

  # 예약 제약
  - 1 ≤ nights ≤ 7
  - check_in_date ∈ [today, today + 6months]
  - check_out_date = check_in_date + nights
  - 1예약 = 1객실 고정 (2실 이상 불가)
  - adults ≥ 1, adults + children ≤ Room.capacity

  # 예약 플로우
  - 예약은 2-step (날짜·인원 → 투숙객 정보). 결제 Step 없음
  - Step 1 → Step 2 전환 시 POST /api/reservations/validate 로 재검증 + 요금 재계산
  - Step 2 "예약 확정" 시 POST /api/reservations 로 insert. 내부에서 validate 재수행 (동시성 대비)
  - 예약 확정 시 ReservationDailyPrice 에 해당 기간 각 일자의 요금 스냅샷 저장

  # 재고 차감 / 복구
  - 예약 확정 — 해당 기간 각 일자의 RoomInventory 행 upsert + stock_count -= 1
  - 예약 취소 — 해당 기간 각 일자의 RoomInventory 행의 stock_count += 1

  # 공지
  - 공지 리스트는 is_pinned=true 먼저 (created_at DESC). 페이지당 8건
  - 공지 상세 진입 시 view_count += 1

  # 관리자
  - 관리자 대시보드 카드 — 오늘 체크인 / 이번 달 예약 / 총 회원 수
  - 일자별 재고/요금은 "기간(from~to) 일괄 적용" UI 로만 변경 (요일 선택 미지원)
