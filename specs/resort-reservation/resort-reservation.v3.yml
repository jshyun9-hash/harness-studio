## -------------------------------------------------------
## 5. API
## -------------------------------------------------------
apis:

  # ==========================================
  # user 백엔드 (port 8081) — /api/...
  # ==========================================

  # --- 회원 ---
  - { method: POST, path: /api/members/signup,            entity: Member,      action: create, auth: false, module: user, description: 회원가입 }
  - { method: POST, path: /api/members/login,             entity: Member,      action: custom, auth: false, module: user, description: 로그인 (USER_SID 쿠키 발급) }
  - { method: POST, path: /api/members/logout,            entity: Member,      action: custom, auth: true,  module: user, description: 로그아웃 }
  - { method: GET,  path: /api/members/me,                entity: Member,      action: custom, auth: true,  module: user, description: 내 정보 (세션) }
  - { method: GET,  path: /api/members/check-id/{loginId}, entity: Member,      action: custom, auth: false, module: user, description: 아이디 중복 체크 }

  # --- 객실 (user) ---
  - { method: GET,  path: /api/rooms,                     entity: Room,        action: list,   auth: false, module: user, description: "객실 리스트. 파라미터 없으면 default_price 기반 (메인). checkIn/checkOut/adults/children + 로그인 세션의 회원유형으로 필터링" }
  - { method: GET,  path: /api/rooms/{id},                entity: Room,        action: detail, auth: false, module: user, description: "객실 상세. 조건이 붙으면 일자별 요금(daily_prices[]) + 예약 가능 여부 포함. 조건 불충족(재고/가격/권한) 시 404 반환하고 프론트는 메인 복귀" }

  # --- 예약 (user) ---
  - { method: POST, path: /api/reservations/validate,     entity: Reservation, action: custom, auth: true,  module: user, description: "예약 가능 여부 + 일자별 요금 + 총액 계산 (Step1 → Step2 전 검증)" }
  - { method: POST, path: /api/reservations,              entity: Reservation, action: create, auth: true,  module: user, description: "예약 확정 (Step2 완료 시). 내부에서 validate 재수행 후 insert" }
  - { method: GET,  path: /api/reservations/my,           entity: Reservation, action: list,   auth: true,  module: user, description: 내 예약 목록 }
  - { method: GET,  path: /api/reservations/by-no/{reservationNo}, entity: Reservation, action: detail, auth: true, module: user, description: 예약번호 기반 예약 확인 (본인만 조회) }
  - { method: PUT,  path: /api/reservations/by-no/{reservationNo}/cancel, entity: Reservation, action: custom, auth: true, module: user, description: "본인 예약 취소 (소유 검증 + status=CONFIRMED + checkInDate >= today 만 허용, RoomInventory 복원)" }

  # --- 공지 (user, public) ---
  - { method: GET,  path: /api/notices,                   entity: Notice,      action: list,   auth: false, module: user, description: 공지 리스트 (카테고리/검색/페이징) }
  - { method: GET,  path: /api/notices/{id},              entity: Notice,      action: detail, auth: false, module: user, description: "공지 상세 (view_count += 1)" }

  # ==========================================
  # admin 백엔드 (port 8084) — /api/admin/...
  # ==========================================

  # --- 관리자 인증 ---
  - { method: POST, path: /api/admin/auth/login,          entity: AdminUser,   action: custom, auth: false, module: admin, description: 관리자 로그인 (ADMIN_SID 쿠키 발급) }
  - { method: POST, path: /api/admin/auth/logout,         entity: AdminUser,   action: custom, auth: true,  module: admin, description: 관리자 로그아웃 }
  - { method: GET,  path: /api/admin/auth/me,             entity: AdminUser,   action: custom, auth: true,  module: admin, description: 관리자 세션 정보 }

  # --- 대시보드 ---
  - { method: GET,  path: /api/admin/dashboard,           entity: Reservation, action: custom, auth: true,  module: admin, description: "요약 카드 (오늘 체크인 / 이번 달 예약 / 총 회원 수)" }

  # --- 객실 관리 ---
  - { method: GET,  path: /api/admin/rooms,               entity: Room,        action: list,   auth: true,  module: admin, description: 객실 리스트 (검색/필터/페이징) }
  - { method: GET,  path: /api/admin/rooms/{id},          entity: Room,        action: detail, auth: true,  module: admin, description: 객실 상세 (이미지/어메니티/권한 포함) }
  - { method: POST, path: /api/admin/rooms,               entity: Room,        action: create, auth: true,  module: admin, description: 객실 등록 }
  - { method: PUT,  path: /api/admin/rooms/{id},          entity: Room,        action: update, auth: true,  module: admin, description: 객실 수정 }
  - { method: DELETE, path: /api/admin/rooms/{id},        entity: Room,        action: delete, auth: true,  module: admin, description: 객실 삭제 }

  # --- 일자별 재고 / 요금 ---
  - { method: GET,  path: /api/admin/rooms/{id}/calendar, entity: RoomInventory, action: custom, auth: true,  module: admin, description: "일자별 재고 + 회원유형별 요금 조회 (기간 from~to). fallback 값 포함" }
  - { method: PUT,  path: /api/admin/rooms/{id}/calendar, entity: RoomInventory, action: custom, auth: true,  module: admin, description: "일자별 재고/요금 일괄 설정. Request: { from, to, stock?, prices?: [{memberType, price}] } — 해당 기간 모든 일자에 upsert" }

  # --- 예약 가능 회원유형 ---
  - { method: GET,  path: /api/admin/rooms/{id}/permissions, entity: RoomPermission, action: list,   auth: true, module: admin, description: 예약 가능 회원유형 조회 }
  - { method: PUT,  path: /api/admin/rooms/{id}/permissions, entity: RoomPermission, action: custom, auth: true, module: admin, description: "예약 가능 회원유형 교체 (Request: { memberTypes: [GENERAL, PARCEL] })" }

  # --- 회원 ---
  - { method: GET,  path: /api/admin/members,             entity: Member,      action: list,   auth: true,  module: admin, description: "회원 리스트 (검색: 이름/아이디/연락처/회원유형, 페이징)" }
  - { method: GET,  path: /api/admin/members/{id},        entity: Member,      action: detail, auth: true,  module: admin, description: 회원 상세 }

  # --- 예약 ---
  - { method: GET,  path: /api/admin/reservations,        entity: Reservation, action: list,   auth: true,  module: admin, description: "예약 리스트 (필터: 기간/객실/회원/상태, 페이징)" }
  - { method: GET,  path: /api/admin/reservations/{id},   entity: Reservation, action: detail, auth: true,  module: admin, description: 예약 상세 (일자별 요금 스냅샷 포함) }
  - { method: PUT,  path: /api/admin/reservations/{id}/cancel, entity: Reservation, action: custom, auth: true, module: admin, description: "예약 취소 (status=CANCELLED + 해당 기간 stock_count += 1)" }

  # --- 공지 ---
  - { method: GET,    path: /api/admin/notices,           entity: Notice,      action: list,   auth: true,  module: admin, description: 공지 리스트 }
  - { method: GET,    path: /api/admin/notices/{id},      entity: Notice,      action: detail, auth: true,  module: admin, description: 공지 상세 }
  - { method: POST,   path: /api/admin/notices,           entity: Notice,      action: create, auth: true,  module: admin, description: 공지 등록 }
  - { method: PUT,    path: /api/admin/notices/{id},      entity: Notice,      action: update, auth: true,  module: admin, description: 공지 수정 }
  - { method: DELETE, path: /api/admin/notices/{id},      entity: Notice,      action: delete, auth: true,  module: admin, description: 공지 삭제 }

## -------------------------------------------------------
## 6. 페이지
## -------------------------------------------------------
pages:

  # ==========================================
  # user 모듈 (frontend key=user, port 5176)
  # ==========================================

  - name: 메인
    module: user
    path: /
    auth: false
    nav: false
    api: [GET /api/rooms]
    ui_source: spec-requests/resort-reservation/design_handoff_byul_resort/versionA-home.jsx
    components: [SearchBox]   # → shared_components.SearchBox 명세 따름
    description: |
      랜딩 + 히어로 + 검색박스 + 객실 그리드 (default_price 기준).
      기본 검색조건 프리셋: 오늘 체크인 / 내일 체크아웃 / 성인 2 / 어린이 0.
      검색박스는 shared_components.SearchBox (popover + 듀얼 캘린더 + 인원 카운터) 사용.
      절대 `<input type="date">` 4 칸 같은 단순 폼으로 구현하지 말 것.
      검색 제출 or 객실 카드 클릭 시:
        - 비로그인 → /login 으로 이동 (redirectTo query 로 원래 경로+조건 보존)
        - 로그인 → /rooms?checkIn&checkOut&adults&children (검색) 또는
                   /rooms/:id?checkIn&checkOut&adults&children (카드 클릭)

  - name: 회원가입
    module: user
    path: /signup
    auth: false
    show_when: logged_out
    nav_order: 80
    api: [POST /api/members/signup, GET /api/members/check-id]
    form_fields:
      - { field: parcel_member_no, label: 분양회원번호, type: text,     required: false, placeholder: "선택 입력" }
      - { field: member_name,      label: 이름,         type: text,     required: true }
      - { field: phone,            label: 연락처,       type: tel,      required: true,  placeholder: "010-0000-0000" }
      - { field: email,            label: 이메일,       type: email,    required: false }
      - { field: login_id,         label: 아이디,       type: text,     required: true,  inline_action: 중복확인 }
      - { field: password,         label: 비밀번호,     type: password, required: true }
      - { field: password_confirm, label: 비밀번호 확인, type: password, required: true }

  - name: 로그인
    module: user
    path: /login
    auth: false
    show_when: logged_out
    nav_order: 90
    api: [POST /api/members/login]
    form_fields:
      - { field: login_id, label: 아이디,   type: text,     required: true }
      - { field: password, label: 비밀번호, type: password, required: true }
    error_display: alert
    description: "성공 시 redirectTo query 있으면 해당 경로로 복귀 (검색조건 보존), 없으면 / 으로"

  - name: 객실 리스트
    module: user
    path: /rooms
    auth: true
    nav_order: 10
    api: [GET /api/rooms]
    ui_source: spec-requests/resort-reservation/design_handoff_byul_resort/versionA-pages.jsx
    components: [SearchBox]   # → shared_components.SearchBox 명세 따름
    description: |
      URL query 의 checkIn/checkOut/adults/children + 세션 회원유형으로 필터링.
      - RoomPermission 에 회원유형 없음 → 제외
      - 기간 중 하루라도 재고 부족 → 제외
      - 기간 중 하루라도 요금 결정 불가 → 제외
      카테고리 탭(전체/스위트/빌라/디럭스/패밀리/스탠다드) 로 추가 필터링.
      상단에 shared_components.SearchBox 노출 (홈에서 넘겨받은 조건 prefill,
      "다시 검색" 라벨로 popover 동일 동작).

  - name: 객실 상세
    module: user
    path: /rooms/:id
    auth: true
    nav: false
    api: [GET /api/rooms/{id}]
    ui_source: spec-requests/resort-reservation/design_handoff_byul_resort/versionA-detail.jsx
    description: |
      조건 불충족 시 "예약 할 수 없는 객실입니다" alert 후 / 로 복귀.
      다박(nights ≥ 2) 이면 일자별 요금 표시 (daily_prices[]).
      갤러리 + 탭(소개/시설/리뷰/정책) + 우측 sticky 예약 박스 (골드 상단 라인).
      "예약하기" 버튼 → /booking/:roomId?checkIn&checkOut&adults&children

  - name: 예약
    module: user
    path: /booking/:roomId
    auth: true
    nav: false
    api: [POST /api/reservations/validate, POST /api/reservations, GET /api/rooms/{id}]
    ui_source: spec-requests/resort-reservation/design_handoff_byul_resort/versionA-flow.jsx
    components: [DualCalendar, ThemedCheckbox, YourStayCard]
    description: |
      2-step 플로우 (결제 Step 없음). 디자인 versionA-flow.jsx 기준.

      [공통 레이아웃]
        - 상단 풀폭 흰색 띠에 StepIndicator (●1 날짜·인원 ─── ○2 투숙객 정보)
            * 활성·완료 step: filled ocean 원 + ink 라벨
            * 비활성 step: mist 보더 원 + mist 라벨
            * step 사이 구분선: w-12~24 / h-px / bg-line
        - 본문: 좌측 main + 우측 360px sticky aside (lg 미만은 stack)
        - 우측 aside = YourStayCard (gold 3px 상단 라인, 객실 썸네일 + 객실명/뷰/침대,
          체크인·체크아웃·인원 요약). Step 1 은 가격 미노출, Step 2 는 가격 breakdown 노출.

      [Step 1 — 날짜·인원]
        - 좌측 메인 상단: 큰 세리프 타이틀 "머무실 날짜를 선택하세요" + 동적 서브타이틀
            * checkIn 미선택 → "체크인 날짜를 선택해주세요."
            * checkOut 미선택 → "체크아웃 날짜를 선택해주세요."
            * 둘 다 선택 → "날짜를 변경하려면 원하는 날짜를 클릭하세요."
        - 캘린더 카드: shared_components.DualCalendar 임베디드 (popover 아님,
          항상 펼쳐진 상태). 절대 `<input type="date">` 두 칸으로 만들지 말 것.
        - 인원 카드: 별도 흰 박스, "투숙 인원" 세리프 타이틀 + 성인/어린이
          CounterRow (성인 만 13세 이상 min 1, 어린이 만 2~12세 min 0).
        - 우측 sticky YourStayCard: 가격 영역 미노출. 좌측 selection 변경이
          실시간으로 반영되어야 함 (checkIn/checkOut/adults/children 동기화).
        - 하단 우측 정렬 "다음 단계 →" 버튼 (px-8 py-3, ocean bg, 풀너비 아님).
          클릭 시 POST /api/reservations/validate. 실패 시 toast + 진행 차단.
          성공 시 validation 응답 보관 후 Step 2 로 전환.

      [Step 2 — 투숙객 정보]
        - 좌측 메인 상단: 큰 세리프 타이틀 "투숙객 정보를 입력하세요"
        - 카드 안에 예약자 정보 요약 (cream bg, 회원명·연락처) + ThemedCheckbox
          "예약자와 동일" + 투숙자명/연락처/요청사항 필드.
        - 우측 sticky YourStayCard 가격 영역 노출 — 일반회원 = 단일가 × 박수,
          분양회원 = 일반가 취소선 + "분양회원 할인" 골드 라인 + 분양회원가 × 박수
          + 총 결제 금액 (font-display 24px ocean).
        - 하단 좌측 "← 이전" / 우측 "예약 확정" 버튼.
          확정 시 POST /api/reservations → /booking/complete/:reservationNo 이동.
    form_fields:
      # Step 1
      - { field: check_in_date,  label: 체크인,        type: date,     required: true, constraint: "today ~ today+6months" }
      - { field: check_out_date, label: 체크아웃,      type: date,     required: true, constraint: "checkIn+1 ~ checkIn+7" }
      - { field: adults,         label: 성인,          type: number,   required: true, min: 1 }
      - { field: children,       label: 어린이,        type: number,   required: true, min: 0 }
      # Step 2
      - { field: is_same_guest,  label: 예약자와 동일, type: checkbox, default: false, note: "체크 시 로그인 회원 정보를 투숙자 정보로 자동 복사" }
      - { field: guest_name,     label: 투숙자명,      type: text,     required: true }
      - { field: guest_phone,    label: 투숙자 연락처, type: tel,      required: true }
