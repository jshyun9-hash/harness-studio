## -------------------------------------------------------
## 리조트 예약 시스템 — 기능 명세 (v3)
## 원본: spec-requests/resort-reservation/resort-reservation.v3.md
##       (v2 와 기능/엔티티/API/페이지 동일. v3 는 버그 패치 + 하네스 규칙 변경만)
## 자료: spec-requests/resort-reservation/design_handoff_byul_resort/
##       (Byul Resort Version A — Hi-fi JSX 프로토타입, Tailwind 재구성)
## -------------------------------------------------------

project:
  id: resort-reservation
  name: 리조트 예약 시스템
  description: 리조트 객실 예약 시스템 (user + admin, 일자별 재고/회원유형별 요금, 다박 예약)
  version: 3

  modules:
    frontend:
      - key: user
        port: 5176
        template: user
        ui_source: spec-requests/resort-reservation/design_handoff_byul_resort/
        proxy_target: user
      - key: admin
        port: 5179
        template: admin
        proxy_target: admin

    backend:
      strategy: split
      apps:
        - { key: user,  port: 8081 }
        - { key: admin, port: 8084 }

    database:
      strategy: shared
      shared_owner: user

  database:
    name: resortdb

## -------------------------------------------------------
## 0. 파일 업로드 정책 (harness/files.md 재정의)
## -------------------------------------------------------
files:
  max_size_mb: 10
  allowed_mime: ["image/png", "image/jpeg", "image/webp"]
  upload_auth: true
  download_auth: false

## -------------------------------------------------------
## 1. changelog
## -------------------------------------------------------
changelog:
  - version: 3
    date: 2026-04-21
    generation: 증분 수정 (버그 패치 + 하네스 규칙 추가)
    changes:
      - 버그 패치 — 사용자 회원가입 페이지 (`frontend/user/src/pages/SignupPage.tsx`)
        에서 input 한 글자 입력 시 포커스 손실 + 한글 IME 합성 중단 발생.
        원인은 SignupPage 함수 본문 안에서 보조 컴포넌트 `Field` 를 정의한 것이며,
        매 렌더마다 새 컴포넌트 type 이 만들어져 자식 `<input>` 이 unmount/remount
        되면서 포커스를 잃었다.
      - 수정 — `Field` 컴포넌트와 `inputClass` 를 SignupPage 함수 외부 (모듈 최상위)
        로 추출. props 인터페이스를 별도 정의하여 한 번만 컴파일·재사용되도록 변경.
      - 하네스 규칙 변경 (재발 방지)
          * harness/coding.md React 패턴 섹션 — "컴포넌트 정의는 모듈 최상위에서만
            (다른 컴포넌트 내부에 정의 금지)" 규칙 + 실제 anti-pattern / 정답 코드
            예시 추가.
          * skills/lessons-learned.md #21 신설 — 동일 사례를 재현 코드 + 수정 코드
            로 정리. 관련 anti-pattern (`useMemo` 안 컴포넌트 정의, props 로
            컴포넌트 타입 동적 전달) 도 함께 명시.
      - 검증 — `frontend/user/src/pages/` 전체 grep 으로 동일 패턴 잔존 여부 확인,
        SignupPage 외 매치 없음.

      - SearchBox UI 재구현 — design_handoff_byul_resort/versionA-search.jsx 의
        ASearchBox + ACalendar 패턴 (popover + 듀얼 캘린더 + 인원 카운터) 으로 전면
        교체. v2 구현은 단순 `<input type="date">` 4 칸이라 디자인 의도와 차이가
        컸다. 자세한 컴포넌트 명세는 아래 `shared_components.SearchBox` 참조.

      - 예약 Step 1 UI 재구현 — design_handoff_byul_resort/versionA-flow.jsx 기준
        으로 "머무실 날짜를 선택하세요" 타이틀 + 임베디드 DualCalendar + 별도
        "투숙 인원" 카드 + 우측 YourStayCard sticky aside 레이아웃으로 재작성.
        v2 구현은 `<input type="date">` 두 칸 + 단순 카운터라 디자인과 큰 차이.
        Step 1 의 우측 사이드바는 좌측 selection 을 실시간 반영하되 **가격은
        노출하지 않음** (가격 계산은 Step 2 진입 시점의 validation 응답으로만).
        상단에 풀폭 StepIndicator 띠 (●1 날짜·인원 ─── ○2 투숙객 정보) 추가.

      - "예약자와 동일" 체크박스 테마 정렬 — 네이티브 `<input type=checkbox>`
        의 브라우저 기본 파란색이 사이트 ocean 테마와 충돌. hidden native input
        + 시각적 박스 SVG 체크 패턴 (ThemedCheckbox) 으로 교체. 자세한 패턴은
        아래 `shared_components.ThemedCheckbox` 참조. 동일 패턴이 필요한 모든
        폼에서 재사용 가능.

      - 마이페이지 본인 예약 취소 기능 추가
          * 신규 API — `PUT /api/reservations/by-no/{reservationNo}/cancel` (user 모듈)
            * 백엔드 검증 — 소유자 일치 + status=CONFIRMED + checkInDate >= today
            * 위반 시 4xx + 한글 에러 메시지 (이미 지난 일정 / 이미 취소됨 / 본인 예약만)
            * 성공 시 status=CANCELLED + 해당 기간 RoomInventory.stock_count += 1
          * 프론트 — 마이페이지 카드 하단에 "상세 보기" + (조건부) "예약 취소"
            버튼. 취소 버튼 노출 조건은 백엔드와 동일. 클릭 시 ConfirmDialog 노출.
          * 새 컴포넌트 — `frontend/user/src/components/common/ConfirmDialog.tsx`
            (gold 상단 라인, danger variant 는 coral, primary variant 는 ocean).
          * MyPage 카드 구조 변경 — 기존엔 카드 전체가 `<Link>` 였으나 카드 안에
            버튼이 들어가야 하므로 카드 컨테이너를 `<div>` 로 바꾸고 객실명·예약번호
            만 `<Link>` 로 처리.
      - 신규 컴포넌트 추가 — `frontend/user/src/components/DualCalendar.tsx` (현재월 +
        다음월 표시, 일/토 색상 구분, 선택일 채움원, 사이 일자 seafoam highlight,
        과거·6개월 초과 disabled).
      - utils 확장 — `frontend/user/src/utils/dates.ts` 에 `formatKoCompact("YYYY-MM-DD")
        → "5월 12일 화"` 와 `dowLabel(0~6) → "일"~"토"` 추가.
      - 기능/엔티티/API/페이지(라우트)/권한/seed 변경 없음. UI 컴포넌트 동작만 변경.

## -------------------------------------------------------
## 1.5 공용 프론트엔드 컴포넌트 (user 모듈)
##     v3 부터 명시. 재생성 시 아래 명세대로 구현되어야 함.
## -------------------------------------------------------
shared_components:
  SearchBox:
    file: frontend/user/src/components/SearchBox.tsx
    ui_source: spec-requests/resort-reservation/design_handoff_byul_resort/versionA-search.jsx
    description: |
      홈 / 객실 리스트 페이지 공용. 닫힌 상태는 4 셀(체크인 / 체크아웃 / 인원 / 객실 검색 버튼)
      가로 배치. 검색 버튼 외 셀 클릭 시 popover 열림.
    props:
      - { name: checkIn,    type: string,         note: "'YYYY-MM-DD'" }
      - { name: checkOut,   type: string,         note: "'YYYY-MM-DD'" }
      - { name: adults,     type: number,         note: "≥ 1" }
      - { name: children,   type: number,         note: "≥ 0" }
      - { name: onChange,   type: "(next) => void", note: "전체 4개 값을 commit (popover 내부에서 즉시 반영, 별도 confirm 단계 없음)" }
      - { name: onSubmit,   type: "() => void",   note: "검색 버튼 클릭" }
      - { name: submitLabel, type: string,        note: "기본 '객실 검색'" }
    closed_state:
      layout: 4 cells in a row (white bg, gold/line border, shadow-md, radius-md)
      cells:
        - { key: 체크인,    value: "formatKoCompact(checkIn)  예: '5월 12일 화'" }
        - { key: 체크아웃,  value: "formatKoCompact(checkOut)" }
        - { key: 인원,      value: "'성인 N · 어린이 M' (어린이 0 이면 '성인 N')" }
        - { key: 객실 검색, value: "ocean bg + 흰색 텍스트 + 돋보기 SVG" }
      cell_label_style: 11px tracking-wider mist 컬러 uppercase
      cell_value_style: font-display 18px ink 컬러
    popover:
      open_when: 체크인/체크아웃 셀 → 'date' 탭, 인원 셀 → 'people' 탭
      close_when:
        - 외부 클릭
        - ESC 키
        - "확인 버튼"
        - "검색 버튼" (자동 닫힘 후 onSubmit)
      style: "absolute below box, mt-2, white bg, shadow-lg, gold 3px 상단 라인"
      tabs:
        - 날짜 (`date`)
        - 인원 (`people`)
      hint_right_text:
        date: 날짜를 다시 고르려면 원하는 날짜를 클릭하세요
        people: 투숙 인원을 선택하세요
      footer:
        - { type: text_button, label: 초기화, onClick: "현재 탭만 reset (date → 오늘+내일, people → 성인 2 / 어린이 0)" }
        - { type: button,      label: 확인, style: "ocean bg + 흰색", onClick: "popover 닫기 (값은 이미 onChange 로 반영됨)" }
    date_tab:
      uses: DualCalendar 컴포넌트
      pick_logic: |
        - 둘 다 비었거나 둘 다 있는 상태에서 클릭 → 새로 시작 (체크인만 설정, 체크아웃 클리어)
        - 클릭 날짜 ≤ 기존 체크인 → 새 체크인으로 시작 (체크아웃 클리어)
        - 클릭 날짜 > 체크인 → 체크아웃 설정. nights 1~7 자동 클램프 (8박 이상이면 +7일로)
      constraints:
        min_date: today (오늘 이전 클릭 비활성)
        max_date: today + 6 months
        nights: 1 ~ 7
    people_tab:
      rows:
        - { label: 성인,   hint: 만 13세 이상, min: 1, default: 2 }
        - { label: 어린이, hint: 만 2~12세,    min: 0, default: 0 }
      counter: "원형(rounded-full) − / + 버튼, min 도달 시 − 버튼 disabled (opacity-30)"

  DualCalendar:
    file: frontend/user/src/components/DualCalendar.tsx
    description: |
      현재월 + 다음월 두 달 가로 배치 (md 미만 모바일은 세로 스택).
      각 월 상단에 "YYYY년 M월" 헤더, 그 아래 일~토 요일행, 그 아래 6주 grid.
      SearchBox popover 안에서도, 예약 Step 1 페이지에서도 동일 컴포넌트 재사용.
    props:
      - { name: checkIn,   type: "string | null" }
      - { name: checkOut,  type: "string | null" }
      - { name: baseMonth, type: Date,            note: "첫 번째 달 기준" }
      - { name: minDate,   type: string }
      - { name: maxDate,   type: string }
      - { name: onPickDate, type: "(dateStr: string) => void" }
    cell_styles:
      default: "h-9 w-9 글씨 — 일요일 coral, 토요일 ocean, 평일 ink"
      hover: "rounded-full + bg-cream"
      check_in_or_out: "filled circle (bg-ocean), 흰색 글씨, font-semibold"
      between: "rgba(134,184,177,0.35) 배경 (seafoam 35%)"
      disabled: "text-mist + cursor-not-allowed (클릭 비활성)"

  ThemedCheckbox:
    description: |
      네이티브 `<input type="checkbox">` 의 브라우저 기본 색(파란색) 이 사이트 테마(ocean)
      와 충돌하므로 **사용 금지**. 대신 hidden native input + 시각적 박스 SVG 체크 패턴 사용.
      v3 부터 적용. 동일 패턴이 필요한 모든 폼에서 재사용.
    pattern: |
      <label className="inline-flex items-center gap-2.5 cursor-pointer select-none px-3 py-2 text-sm
                        border transition-colors {checked ? 'border-ocean bg-ocean/5 text-ocean'
                                                          : 'border-line text-slateBrand hover:bg-cream'}"
             style={{ borderRadius: 'var(--radius-sm)' }}>
        <span className="w-4 h-4 inline-flex items-center justify-center border
                         {checked ? 'bg-ocean border-ocean' : 'border-mist'}"
              style={{ borderRadius: '2px' }}>
          {checked && (
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="white" strokeWidth="2.5">
              <path d="M3 8.5l3 3 7-7" />
            </svg>
          )}
        </span>
        <input type="checkbox" className="sr-only" checked={checked} onChange={...} />
        {label}
      </label>
    forbidden: |
      ❌ <input type="checkbox" /> 단독 사용 — 브라우저 기본 파란색 노출.
      ❌ Tailwind `accent-{color}` 만으로 해결도 비권장 (브라우저별 렌더링 차이).
      ✅ 위 ThemedCheckbox 패턴 재사용.

  ConfirmDialog:
    file: frontend/user/src/components/common/ConfirmDialog.tsx
    description: |
      모달 형태의 확인 대화상자. 마이페이지 예약 취소·기타 destructive 액션에서 사용.
      gold 3px 상단 라인 + 흰 배경. 외부 클릭 시 닫히지 않음 (의도적, 명시적 선택 강제).
    props:
      - { name: open,         type: boolean }
      - { name: title,        type: string,  default: "'확인'" }
      - { name: message,      type: string,  note: "줄바꿈은 \\n 으로, 컴포넌트는 whitespace-pre-line 로 렌더" }
      - { name: confirmLabel, type: string,  default: "'확인'" }
      - { name: cancelLabel,  type: string,  default: "'취소'" }
      - { name: variant,      type: "'danger' | 'primary'", default: "'primary'", note: "danger → coral, primary → ocean" }
      - { name: onConfirm,    type: "() => void" }
      - { name: onCancel,     type: "() => void" }
    style: |
      Backdrop: fixed inset-0 bg-black/40 z-50.
      Card: max-w-sm 흰 배경, gold 3px 상단 라인, padding 6.
      Title: font-display 18px ink.
      Message: text-sm slateBrand whitespace-pre-line leading-relaxed.
      Footer: 우측 정렬, [취소(border-line text-slateBrand)] [확인(variant 컬러 bg + 흰 텍스트)].

  YourStayCard:
    description: |
      예약 페이지 우측 sticky 사이드바. gold 3px 상단 라인 + 흰 배경 카드.
      좌측 본문 selection 변경이 실시간 반영되어야 함 (체크인/체크아웃/인원).
      Step 단계에 따라 가격 영역 노출 여부 분기.
    props:
      - { name: room,       type: "RoomDetail | null", note: "객실 정보" }
      - { name: variant,    type: "PlaceholderImage variant", note: "썸네일 없을 때 그라디언트" }
      - { name: checkIn,    type: string }
      - { name: checkOut,   type: string }
      - { name: adults,     type: number }
      - { name: children,   type: number }
      - { name: validation, type: "ReservationValidateResponse | null", note: "Step 1 → null (가격 영역 미노출), Step 2 → 응답 객체 (가격 breakdown 노출)" }
    layout:
      header:
        - "label-en: YOUR STAY (gold, tracking-[3px], uppercase)"
        - "분양회원 뱃지 (validation.memberType === 'PARCEL' 일 때만): ★ 분양회원 전용가 적용 / 골드 15% bg + 골드 텍스트"
      room_block: "썸네일 80x80 (없으면 PlaceholderImage variant) + 객실명(font-display 18px) + 뷰 + 침대"
      summary:
        - "체크인 / 체크아웃 / 인원  →  YYYY.MM.DD 또는 '성인 N · 어린이 M' 우측 정렬"
        - "Step 1 (validation == null): 여기서 끝. 가격 영역 미노출"
        - "Step 2 (validation 채워짐): 아래 가격 영역 추가"
      pricing_block_step2:
        - "일반회원: defaultPrice × nights → 총 결제 금액"
        - "분양회원: defaultPrice × nights (취소선) → '분양회원 할인 -X원' (gold) → 분양회원가 × nights → 총 결제 금액"
        - "총 결제 금액 라벨: 16px ink medium / 금액: font-display 24px ocean"
    constraint: |
      Step 1 에서 가격이 노출되면 안 됨 — validation 호출은 "다음 단계" 클릭 시에만.
      좌측 캘린더에서 날짜 변경 → 우측 카드의 체크인/체크아웃/인원만 즉시 갱신,
      가격은 변경되지 않음 (Step 2 진입 시점에 한 번만 계산).

  - version: 2
    date: 2026-04-21
    generation: 신규 생성 (v2)
    changes:
      - 어드민 모듈 신규 추가 (Case 3 — split backend + shared DB, shared_owner=user)
      - 사용자/관리자 테이블 분리 — role 컬럼 제거, Member(user) / AdminUser(admin) + 세션 쿠키 분리(USER_SID/ADMIN_SID)
      - 사용자 프론트 디자인 리뉴얼 (Byul Resort Version A, Tailwind 재구성)
      - 일자별 재고 도입 (RoomInventory)
      - 일자별 + 회원유형별 요금 도입 (RoomDailyPrice), 회원유형 무관 기본가 Room.default_price
      - 예약 다박 허용 (1~7박), 오늘 ~ +6개월, 성인/어린이 인원 분리
      - 예약 일자별 요금 스냅샷 저장 (ReservationDailyPrice)
      - 예약 플로우 2-step (날짜·인원 → 투숙객). 결제 Step 없음
      - 객실 이미지 확장 — 썸네일 1장 + 갤러리 최대 5장 (공통 파일업로드)
      - 공지사항(Notice) 신규 추가 — user 조회 / admin CRUD
      - 객실 메타 확장 — 카테고리/영문명/설명/침대/크기/인원/전망/뱃지/어메니티
      - v1 의 RoomPrice(회원유형별 고정가) 폐기 → default_price + RoomDailyPrice 로 대체
  - version: 1
    date: 2026-04-16
    generation: 신규 생성
    changes:
      - 초기 버전 (회원가입, 로그인, 객실 조회, 객실 예약, 예약 확인)
      - 회원 유형(일반/분양) 분기 및 회원별 객실/요금 차등 규칙

## -------------------------------------------------------
## 2. 엔티티
## -------------------------------------------------------
##
## 주의:
##   - StoredFile / CodeGroup / CodeItem 은 공통 하네스 규칙에 의해 자동 주입 (명시하지 않음)
##     * harness/files.md, harness/common-code.md 참조
##   - split backend + shared DB 이므로 shared_owner(user) 가 DDL 주도권.
##     admin 백엔드는 ddl-auto=validate 로 동일 스키마를 읽는다.
##   - Member 는 user 백엔드만 코드 보유, AdminUser 는 admin 백엔드만 코드 보유.
##     그 외 도메인(Room, Reservation, Notice, RoomInventory, ...) 은 양쪽 백엔드 모두에
##     엔티티 복제 생성 — 각 백엔드의 Service 에서 필요한 API 만 노출한다.
##
entities:

  ## ==== 사용자 계정 (user 백엔드 전용) ====
  Member:
    table: member
    description: 일반 사용자 (일반 / 분양 회원). user 백엔드에서만 관리
    backend_scope: [user]
    fields:
      - { name: member_id,         type: Long,      pk: true, auto: true }
      - { name: login_id,          type: String,    required: true, unique: true, label: 아이디 }
      - { name: password,          type: String,    required: true, min: 8, label: 비밀번호 }
      - { name: member_name,       type: String,    required: true, label: 이름 }
      - { name: phone,             type: String,    required: true, label: 연락처 }
      - { name: email,             type: String,    required: false, label: 이메일 }
      - { name: parcel_member_no,  type: String,    required: false, label: 분양회원번호 }
      - { name: member_type,       type: Enum,      enum: MemberType, derived: true, label: 회원유형 }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    enums:
      MemberType: [GENERAL, PARCEL]   # 일반, 분양
    derived_rules:
      member_type: "parcel_member_no 가 존재하면 PARCEL, 없으면 GENERAL"
    validations:
      - { field: login_id, rule: unique,  message: 이미 사용 중인 아이디입니다 }
      - { field: password, rule: "min:8", message: 비밀번호는 8자리 이상이어야 합니다 }
      - { field: password, rule: "regex:^(?=.*[a-zA-Z])(?=.*\\d).+$", message: 비밀번호는 영문과 숫자를 포함해야 합니다 }
      - { field: phone,    rule: "regex:^01[016789]-?\\d{3,4}-?\\d{4}$", message: 연락처 형식이 올바르지 않습니다 }
      - { field: email,    rule: email,   message: 이메일 형식이 올바르지 않습니다, when: provided }
      # parcel_member_no 는 입력 여부만 판단 (별도 형식 검증 없음)

  ## ==== 관리자 계정 (admin 백엔드 전용) ====
  AdminUser:
    table: admin_user
    description: 관리자 계정. admin 백엔드에서만 관리 (Member 와 별도 테이블)
    backend_scope: [admin]
    fields:
      - { name: admin_user_id, type: Long,      pk: true, auto: true }
      - { name: login_id,      type: String,    required: true, unique: true, label: 아이디 }
      - { name: password,      type: String,    required: true, min: 8, label: 비밀번호 }
      - { name: admin_name,    type: String,    required: true, label: 이름 }
      - { name: created_at,    type: Timestamp, auto: true, audit: true }
      - { name: updated_at,    type: Timestamp, auto: true, audit: true }
    validations:
      - { field: login_id, rule: unique,  message: 이미 사용 중인 아이디입니다 }
      - { field: password, rule: "min:8", message: 비밀번호는 8자리 이상이어야 합니다 }

  ## ==== 객실 ====
  Room:
    table: room
    description: 객실 마스터 (기본 정보 + 기본 재고/요금 fallback)
    fields:
      - { name: room_id,            type: Long,      pk: true, auto: true }
      - { name: room_code,          type: String,    required: true, unique: true, label: 객실코드 }
      - { name: room_name,          type: String,    required: true, label: 객실명 }
      - { name: en_name,            type: String,    required: false, label: 영문명 }
      - { name: category_code_id,   type: Long,      fk: CodeItem, required: true, code_group: ROOM_CATEGORY, label: 카테고리 }
      - { name: description,        type: String,    required: false, lob: true, label: 소개 }
      - { name: bed,                type: String,    required: false, label: 침대 }
      - { name: size_sqm,           type: Integer,   required: false, label: 크기(㎡) }
      - { name: capacity,           type: Integer,   required: true, default: 2, label: 최대 인원 }
      - { name: view_name,          type: String,    required: false, label: 전망 }
      - { name: default_stock,      type: Integer,   required: true, default: 0, label: 기본 재고 }
      - { name: default_price,      type: Integer,   required: true, default: 0, label: 기본 요금(회원유형 무관) }
      - { name: thumbnail_file_id,  type: Long,      fk: StoredFile, required: false, label: 리스트 썸네일 }
      - { name: badge_code_id,      type: Long,      fk: CodeItem, required: false, code_group: ROOM_BADGE, label: 뱃지 }
      - { name: is_active,          type: Boolean,   required: true, default: true, label: 노출 여부 }
      - { name: created_at,         type: Timestamp, auto: true, audit: true }
      - { name: updated_at,         type: Timestamp, auto: true, audit: true }
    relations:
      - { entity: RoomImage,       type: one-to-many, mapped_by: room }
      - { entity: RoomAmenity,     type: one-to-many, mapped_by: room }
      - { entity: RoomInventory,   type: one-to-many, mapped_by: room }
      - { entity: RoomDailyPrice,  type: one-to-many, mapped_by: room }
      - { entity: RoomPermission,  type: one-to-many, mapped_by: room }

  ## ==== 객실 갤러리 (최대 5장) ====
  RoomImage:
    table: room_image
    description: 객실 상세 갤러리 (thumbnail 은 Room.thumbnail_file_id 별도)
    fields:
      - { name: room_image_id, type: Long,      pk: true, auto: true }
      - { name: room_id,       type: Long,      fk: Room, required: true }
      - { name: image_file_id, type: Long,      fk: StoredFile, required: true, label: 이미지 }
      - { name: sort_order,    type: Integer,   required: true, default: 0, label: 노출 순서 }
      - { name: created_at,    type: Timestamp, auto: true, audit: true }
      - { name: updated_at,    type: Timestamp, auto: true, audit: true }
    business_rules:
      - 객실당 최대 5장 (Service 레이어에서 검증)

  ## ==== 객실 어메니티 (CodeItem 매핑) ====
  RoomAmenity:
    table: room_amenity
    description: 객실별 편의시설 (free-wifi/pool/spa/parking/breakfast 등)
    fields:
      - { name: room_amenity_id, type: Long,      pk: true, auto: true }
      - { name: room_id,         type: Long,      fk: Room, required: true }
      - { name: amenity_code_id, type: Long,      fk: CodeItem, required: true, code_group: ROOM_AMENITY, label: 편의시설 }
      - { name: created_at,      type: Timestamp, auto: true, audit: true }
      - { name: updated_at,      type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, amenity_code_id]

  ## ==== 객실 일자별 재고 ====
  RoomInventory:
    table: room_inventory
    description: 객실 일자별 재고. 해당 일자 행이 없으면 Room.default_stock 로 fallback
    fields:
      - { name: room_inventory_id, type: Long,      pk: true, auto: true }
      - { name: room_id,           type: Long,      fk: Room, required: true }
      - { name: stay_date,         type: LocalDate, required: true, label: 일자 }
      - { name: stock_count,       type: Integer,   required: true, default: 0, label: 재고 }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, stay_date]
    business_rules:
      - 예약 확정 시 해당 기간 각 일자의 stock_count -= 1
      - 행이 없으면 Room.default_stock 으로 간주 (확정 시에는 행을 생성하여 차감)
      - 예약 취소 시 해당 기간 각 일자의 stock_count += 1

  ## ==== 객실 일자별 + 회원유형별 요금 ====
  RoomDailyPrice:
    table: room_daily_price
    description: 객실 일자별 + 회원유형별 요금. 해당 (일자, 회원유형) 행이 없으면 Room.default_price 로 fallback
    fields:
      - { name: room_daily_price_id, type: Long,      pk: true, auto: true }
      - { name: room_id,             type: Long,      fk: Room, required: true }
      - { name: stay_date,           type: LocalDate, required: true, label: 일자 }
      - { name: member_type,         type: Enum,      enum: MemberType, required: true, label: 회원유형 }
      - { name: price,               type: Integer,   required: true, label: 금액 }
      - { name: created_at,          type: Timestamp, auto: true, audit: true }
      - { name: updated_at,          type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, stay_date, member_type]
    business_rules:
      - 가격 계산 시 우선순위 — RoomDailyPrice(room, date, memberType) > Room.default_price
      - default_price 는 회원유형 무관 단일값

  ## ==== 객실 예약 가능 회원유형 ====
  RoomPermission:
    table: room_permission
    description: 객실이 허용하는 회원유형 (일반/분양)
    fields:
      - { name: room_permission_id, type: Long,      pk: true, auto: true }
      - { name: room_id,            type: Long,      fk: Room, required: true }
      - { name: member_type,        type: Enum,      enum: MemberType, required: true, label: 예약가능 회원유형 }
      - { name: created_at,         type: Timestamp, auto: true, audit: true }
      - { name: updated_at,         type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [room_id, member_type]

  ## ==== 예약 ====
  Reservation:
    table: reservation
    description: 예약 (1예약 = 1객실, 1~7박)
    fields:
      - { name: reservation_id,      type: Long,      pk: true, auto: true }
      - { name: reservation_no,      type: String,    unique: true, auto: true, label: 예약번호 }
      - { name: member_id,           type: Long,      fk: Member, required: true }
      - { name: room_id,             type: Long,      fk: Room, required: true }
      - { name: check_in_date,       type: LocalDate, required: true, label: 체크인 }
      - { name: check_out_date,      type: LocalDate, required: true, label: 체크아웃 }
      - { name: nights,              type: Integer,   required: true, label: 박수 }
      - { name: adults,              type: Integer,   required: true, default: 2, label: 성인 }
      - { name: children,            type: Integer,   required: true, default: 0, label: 어린이 }
      - { name: guest_name,          type: String,    required: true, label: 투숙자명 }
      - { name: guest_phone,         type: String,    required: true, label: 투숙자 연락처 }
      - { name: special_request,     type: String,    required: false, lob: true, label: 요청사항 }
      - { name: member_type_applied, type: Enum,      enum: MemberType, required: true, label: 적용된 회원유형 }
      - { name: total_price,         type: Integer,   required: true, label: 총 결제 금액 }
      - { name: status,              type: Enum,      enum: ReservationStatus, default: CONFIRMED, label: 예약상태 }
      - { name: reservation_date,    type: LocalDate, auto: true, label: 예약일자 }
      - { name: created_at,          type: Timestamp, auto: true, audit: true }
      - { name: updated_at,          type: Timestamp, auto: true, audit: true }
    enums:
      ReservationStatus: [CONFIRMED, CANCELLED]   # 확정, 취소
    relations:
      - { entity: ReservationDailyPrice, type: one-to-many, mapped_by: reservation }
    business_rules:
      - 로그인한 Member 만 예약 생성 가능
      - 1 ≤ nights ≤ 7, check_out_date - check_in_date == nights
      - check_in_date 는 오늘 ~ today + 6months 범위
      - adults ≥ 1, adults + children ≤ Room.capacity
      - 예약 확정 시 해당 기간 각 일자의 RoomInventory.stock_count -= 1 (없으면 default_stock 기반 행 생성 후 차감)
      - 예약 취소 시 해당 기간 각 일자의 stock_count += 1
      - reservation_no 포맷 — `BR-YYYYMMDD-NNNN` (디자인 예시 준수)
    validations:
      - { rule: room_permission,    message: "해당 객실은 회원 유형에 따라 예약이 불가합니다" }
      - { rule: stock_available,    message: "선택한 기간 중 재고가 부족한 날짜가 있습니다" }
      - { rule: date_range,         message: "체크인은 오늘 ~ 6개월 이내, 체크아웃은 체크인 이후 최대 7박까지 가능합니다" }
      - { rule: capacity,           message: "선택한 인원이 객실 최대 수용 인원을 초과합니다" }

  ## ==== 예약 일자별 요금 스냅샷 ====
  ReservationDailyPrice:
    table: reservation_daily_price
    description: 예약 시점의 일자별 요금 스냅샷 (후일 가격 변경 무관하게 예약 이력 보존)
    fields:
      - { name: reservation_daily_price_id, type: Long,      pk: true, auto: true }
      - { name: reservation_id,             type: Long,      fk: Reservation, required: true }
      - { name: stay_date,                  type: LocalDate, required: true, label: 일자 }
      - { name: price,                      type: Integer,   required: true, label: 금액 }
      - { name: created_at,                 type: Timestamp, auto: true, audit: true }
      - { name: updated_at,                 type: Timestamp, auto: true, audit: true }
    unique_constraints:
      - [reservation_id, stay_date]

  ## ==== 공지사항 ====
  Notice:
    table: notice
    description: 공지사항 (공지 / 이벤트 / 시설)
    fields:
      - { name: notice_id,        type: Long,      pk: true, auto: true }
      - { name: title,            type: String,    required: true, label: 제목 }
      - { name: category_code_id, type: Long,      fk: CodeItem, required: true, code_group: NOTICE_CATEGORY, label: 분류 }
      - { name: content,          type: String,    required: true, lob: true, label: 내용 }
      - { name: is_pinned,        type: Boolean,   required: true, default: false, label: 상단 고정 }
      - { name: view_count,       type: Integer,   required: true, default: 0, label: 조회수 }
      - { name: created_at,       type: Timestamp, auto: true, audit: true }
      - { name: updated_at,       type: Timestamp, auto: true, audit: true }
    business_rules:
      - 사용자 리스트 노출은 is_pinned=true 먼저, 그 다음 created_at DESC
      - 사용자 상세 조회 시 view_count += 1

