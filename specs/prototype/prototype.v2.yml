## -------------------------------------------------------
## Prototype (Moyza) — 기능 명세 (v2)
## 원본: spec-requests/prototype/prototype.v2.md
##       (v1 기능 전부 유지, Title.synopsis 매핑 정정만 포함)
## 자료: spec-requests/prototype/프로토타입_ux.pdf
##       spec-requests/prototype/prototype_claude.html
## -------------------------------------------------------

project:
  id: prototype
  name: Moyza 프로토타입
  description: 모바일 OTT/드라마·영화 탐색 및 리뷰 앱 (사용자 모바일 + 관리자 설정 페이지)
  version: 2

  modules:
    frontend:
      - key: user
        port: 5177
        template: custom
        ui_source: spec-requests/prototype/prototype_claude.html
        proxy_target: user
      - key: admin
        port: 5178
        template: admin
        proxy_target: admin

    backend:
      strategy: split
      apps:
        - { key: user,  port: 8082, role_scope: [USER, ADMIN] }
        - { key: admin, port: 8083, role_scope: [ADMIN] }

    database:
      strategy: shared
      shared_owner: user

  database:
    name: prototypedb

## -------------------------------------------------------
## 0. 파일 업로드 정책 (harness/files.md 재정의)
## -------------------------------------------------------
files:
  max_size_mb: 10
  allowed_mime: ["image/png", "image/jpeg", "image/webp"]
  upload_auth: true           # 로그인 필수 (관리자 업로드 전제)
  download_auth: false        # 공개 다운로드

## -------------------------------------------------------
## 1. changelog
## -------------------------------------------------------
changelog:
  - version: 1
    date: 2026-04-17
    generation: 신규 생성
    changes:
      - 초기 버전 (Case 3: split backend + shared DB)
      - 사용자 프론트: 모바일 전용 custom UI (ui_source=prototype_claude.html)
      - 관리자 프론트: admin 템플릿 (Sidebar + Topbar)
      - 공통 코드 3그룹 seed (COUNTRY, GENRE, PLATFORM)
      - 홈 섹션 3개 seed (NEW_RELEASE, TRENDS, KOREA_PICK) — 자동 로직, 관리자는 is_visible 만 제어
      - 배너/작품/배우/사이트 설정 CRUD
      - 파일 업로드 공통 (StoredFile 자동 주입)

  - version: 2
    date: 2026-04-19
    generation: 증분 수정 (버그 패치)
    changes:
      - Title.synopsis 매핑 정정 — @Lob + columnDefinition="TEXT" 조합이
        H2 v2 에서 VARCHAR 로 저장되어 admin(ddl-auto=validate) 기동 실패 유발.
        재생성 시 긴 텍스트 필드는 @Lob 단독 (columnDefinition 생략 → H2 CLOB) 로 생성.
      - TitleAdminService 의 매핑 교체(replaceGenres/Platforms/Similar/Cast)
        에서 derived deleteByTitleId() 직후 save() 호출 시 Hibernate 가 INSERT 를
        DELETE 보다 먼저 flush 해 UNIQUE 제약(예: UQ_TITLE_GENRE, UQ_TITLE_CAST) 위반.
        정정: delete 직후 repository.flush() 강제 후 insert.
      - SurveyBanner 컴포넌트 **전면 삭제** — 원본 HTML 프로토타입의 정적
        promo("Join now and get a free Americano !") 로, 관리자가 이미지/문구를
        제어할 수 없는 반(半)수동 UI 였음. 사용자 배너는 관리자 CRUD 를 거친
        Banner (BannerCarousel) 한 가지로 단일화.
        - HomePage.tsx / TitleDetailPage.tsx 에서 SurveyBanner 사용 제거
        - components/home/SurveyBanner.tsx 파일 삭제

      - 작품 상세 페이지 중간 **관리자 배너 공유 노출** 구현 (원본 Page 5 수정사항 실현).
        - user BE: GET /api/banners 공개 엔드포인트 신설 (HomeService.getBanners 분리 재사용).
          홈의 `/api/home` 내 banners 와 동일 결과 (visible=true, sort_order, LIMIT 5).
        - user FE: api/bannerApi.ts + hooks/useBanners.ts 신설.
          TitleDetailPage 의 PlatformRow 아래에 BannerCarousel 재사용으로 노출.
          배너 없으면 영역 자체 미렌더.

      - 리스트 테이블 행 액션(수정/삭제) **chip 스타일 통일**.
        - 공통 컴포넌트 신설: components/common/table/RowActionChip.tsx
          (variant: default | danger, pill 테두리 + 흰 배경)
        - Title/Banner/Cast/Code 리스트의 raw `<button>` 을 모두 RowActionChip 으로 교체.
        - harness/template-admin.md 에 "rowActions 는 RowActionChip 사용 필수" 조항 추가.

      - admin 리스트 페이지 **공통 컴포넌트 일관성 교정**.
        - raw `<table>` → DataTable 로 리팩터링: SectionListPage, CodePage
        - SearchFilter + Pagination 도입: BannerListPage, CastListPage, TitleListPage
        - admin BE 페이징/검색 시그니처 통일 (JpaSpecificationExecutor + PageResponse):
          * BannerController/Service — `?linkUrl&visible&page&size`
          * CastController/Service — `?name&active&page&size` (name 은 castNameKo/En OR 부분 검색)
          * TitleController/Service — `?q&active&page&size` (q 는 titleNameKo/En OR 부분 검색)
        - DashboardPage 는 페이징 반환 계약에 맞춰 `totalCount` 사용.
        - CastEditor / SimilarTitlesEditor 의 옵션 로딩도 새 시그니처로 교체.
        - 하네스 보강: template-admin.md 에 "리스트 페이지 표준 구성(SearchFilter+DataTable+Pagination)"
          조항 신설 + 백엔드 시그니처 규격 명시. Seed 고정 리스트만 검색/페이징 생략 허용.

      - 섹션 노출 관리에 **노출명/서브 라벨 편집 기능** 추가. 기존에는 is_visible/
        sort_order/max_count 만 수정 가능했으나, display_name_ko / display_name_en /
        sub_label 도 인라인 blur 저장으로 편집 가능. section_key 는 자동 로직
        식별자(NEW_RELEASE/TRENDS/KOREA_PICK) 라 read-only 유지. Section 엔티티
        update() 시그니처 + SectionUpdateRequest DTO + SectionListPage 테이블 확장.

      - admin 공통 레이아웃 변경 (Sidebar/Topbar 로그아웃 위치 이관 + 이중 표기 제거).
        - Sidebar 하단 카드: 관리자 이름 + 로그인 ID 만 노출, **로그아웃 버튼 제거**
        - Topbar 우측: **로그아웃 아이콘 버튼만** (이름 표시 제거 — Sidebar 와 중복이라 삭제).
          아이콘만, 텍스트 라벨 없음, aria-label/title 로 접근성 확보.
        - harness/template-admin.md 의 Sidebar/Topbar 예시/규칙도 동일하게 갱신 —
          재생성 시 모든 admin 프로젝트에 동일 적용.
      - v1 에서는 동일 수정이 생성된 코드에 수동 반영됨 (lessons-learned #19, #20 참조).
      - 하네스 규칙 변경:
          * harness/coding.md Entity 패턴 샘플을 @Lob 단독으로 업데이트
          * skills/lessons-learned.md #19 (H2 긴 텍스트 매핑) / #20 (delete-then-insert flush) 신설
      - 기능/엔티티/API/페이지/권한 변경 없음.

## -------------------------------------------------------
## 2. 엔티티
## -------------------------------------------------------
##
## 주의:
##   - StoredFile, CodeGroup, CodeItem 은 공통 하네스 규칙에 의해 자동 주입 (명시하지 않음)
##     * harness/files.md, harness/common-code.md 참조
##   - split backend + shared DB 이므로 모든 엔티티는 양쪽 백엔드에 동일 복제 생성됨
##
entities:

  Member:
    table: member
    description: 로그인 계정 (v1 은 관리자만 사용)
    fields:
      - { name: member_id,    type: Long,      pk: true, auto: true }
      - { name: login_id,     type: String,    required: true, unique: true, label: 아이디 }
      - { name: password,     type: String,    required: true, min: 8, label: 비밀번호 }
      - { name: member_name,  type: String,    required: true, label: 이름 }
      - { name: role,         type: Enum,      enum: Role, required: true, default: USER, label: 권한 }
      - { name: created_at,   type: Timestamp, auto: true, audit: true }
      - { name: updated_at,   type: Timestamp, auto: true, audit: true }
    enums:
      Role: [USER, ADMIN]
    validations:
      - { field: login_id, rule: unique,   message: 이미 사용 중인 아이디입니다 }
      - { field: password, rule: "min:8",  message: 비밀번호는 8자리 이상이어야 합니다 }

  Section:
    table: section
    description: 홈 섹션 (seed 고정 3건, 관리자는 is_visible 만 제어)
    fields:
      - { name: section_id,       type: Long,      pk: true, auto: true }
      - { name: section_key,      type: String,    required: true, unique: true, label: 섹션 키 }
      - { name: display_name_ko,  type: String,    required: true, label: 한글명 }
      - { name: display_name_en,  type: String,    required: true, label: 영문명 }
      - { name: sub_label,        type: String,    required: false, label: 부제 }
      - { name: sort_order,       type: Integer,   required: true, default: 0, label: 노출 순서 }
      - { name: is_visible,       type: Boolean,   required: true, default: true, label: 노출 여부 }
      - { name: max_count,        type: Integer,   required: true, default: 20, label: 최대 노출 수 }
      - { name: created_at,       type: Timestamp, auto: true, audit: true }
      - { name: updated_at,       type: Timestamp, auto: true, audit: true }
    business_rules:
      - section_key 로 구분되는 3가지 자동 로직 (NEW_RELEASE / TRENDS / KOREA_PICK)
      - 관리자는 is_visible 만 실질적으로 조작 (sort_order·max_count 도 수정 가능하나 UI 에서는 기본 숨김)
      - 섹션 자체의 추가/삭제 불가 — seed 로만 생성

  Banner:
    table: banner
    description: 홈 + 작품 상세 공용 배너
    fields:
      - { name: banner_id,     type: Long,      pk: true, auto: true }
      - { name: image_file_id, type: Long,      fk: StoredFile, required: true, label: 배너 이미지 }
      - { name: link_url,      type: String,    required: true, label: 링크 URL }
      - { name: sort_order,    type: Integer,   required: true, default: 0, label: 노출 순서 }
      - { name: is_visible,    type: Boolean,   required: true, default: true, label: 노출 여부 }
      - { name: created_at,    type: Timestamp, auto: true, audit: true }
      - { name: updated_at,    type: Timestamp, auto: true, audit: true }
    business_rules:
      - 사용자 화면 노출 규칙 — is_visible=true ORDER BY sort_order ASC LIMIT 5
      - 홈과 작품 상세에서 동일 리스트 공유

  SiteSetting:
    table: site_setting
    description: 사이트 단일 설정 (singleton, site_setting_id = 1 고정)
    fields:
      - { name: site_setting_id,   type: Long,      pk: true, auto: true }
      - { name: logo_file_id,      type: Long,      fk: StoredFile, required: false, label: 로고 이미지 }
      - { name: board_survey_url,  type: String,    required: false, label: Board 설문 URL }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    business_rules:
      - 단일 레코드만 존재 (seed 시 site_setting_id=1 삽입)
      - 관리자 수정만 가능, 삭제 불가

  Title:
    table: title
    description: 작품 (드라마/영화)
    fields:
      - { name: title_id,          type: Long,      pk: true, auto: true }
      - { name: title_name_ko,     type: String,    required: true, label: 한글 제목 }
      - { name: title_name_en,     type: String,    required: false, label: 영문 제목 }
      - { name: poster_file_id,    type: Long,      fk: StoredFile, required: false, label: 포스터 썸네일 }
      - { name: backdrop_file_id,  type: Long,      fk: StoredFile, required: false, label: 상세 히어로 이미지 }
      - { name: country_code_id,   type: Long,      fk: CodeItem, required: true, code_group: COUNTRY, label: 국가 }
      - { name: release_year,      type: Integer,   required: false, label: 출시 연도 }
      - { name: episode_count,     type: Integer,   required: false, label: 에피소드 수 }
      - { name: age_rating,        type: String,    required: false, label: 연령 등급 }
      - { name: rating,            type: Decimal,   precision: 2, scale: 1, required: false, label: 별점 }
      - { name: review_count,      type: Integer,   required: true, default: 0, label: 리뷰 수 }
      - { name: synopsis,          type: Text,      required: false, label: 시놉시스 }
      - { name: watch_now_url,     type: String,    required: false, label: Watch Now URL }
      - { name: is_active,         type: Boolean,   required: true, default: true, label: 노출 여부 }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    business_rules:
      - 사용자 화면 (홈/탐색/상세) 은 is_active=true 만 조회
      - rating, review_count 는 관리자 수동 입력 (v1 에는 리뷰 기능 없음)
      - watch_now_url 비어있으면 Watch Now 버튼 비활성화

  TitleGenre:
    table: title_genre
    description: 작품-장르 다대다 매핑 (장르는 공통 코드 GENRE 그룹)
    fields:
      - { name: title_genre_id, type: Long,      pk: true, auto: true }
      - { name: title_id,       type: Long,      fk: Title, required: true }
      - { name: genre_code_id,  type: Long,      fk: CodeItem, required: true, code_group: GENRE, label: 장르 }
      - { name: sort_order,     type: Integer,   required: true, default: 0, label: 정렬 순서 }
      - { name: created_at,     type: Timestamp, auto: true, audit: true }
      - { name: updated_at,     type: Timestamp, auto: true, audit: true }
    unique: [[title_id, genre_code_id]]
    business_rules:
      - 카드/상세 메타칩의 "대표 장르" 는 sort_order=0 인 항목의 name_ko

  TitlePlatform:
    table: title_platform
    description: 작품-플랫폼 다대다 매핑 (플랫폼별 시청 URL 포함)
    fields:
      - { name: title_platform_id, type: Long,      pk: true, auto: true }
      - { name: title_id,          type: Long,      fk: Title, required: true }
      - { name: platform_code_id,  type: Long,      fk: CodeItem, required: true, code_group: PLATFORM, label: 플랫폼 }
      - { name: watch_url,         type: String,    required: true, label: 시청 URL }
      - { name: sort_order,        type: Integer,   required: true, default: 0, label: 정렬 순서 }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    unique: [[title_id, platform_code_id]]
    business_rules:
      - 작품 상세의 플랫폼 바는 이 매핑이 있는 플랫폼만 노출 (없으면 자연 숨김)

  TitleSimilar:
    table: title_similar
    description: 작품-유사작 다대다 매핑 (관리자 수동 지정)
    fields:
      - { name: title_similar_id,  type: Long,      pk: true, auto: true }
      - { name: title_id,          type: Long,      fk: Title, required: true }
      - { name: similar_title_id,  type: Long,      fk: Title, required: true }
      - { name: sort_order,        type: Integer,   required: true, default: 0, label: 정렬 순서 }
      - { name: created_at,        type: Timestamp, auto: true, audit: true }
      - { name: updated_at,        type: Timestamp, auto: true, audit: true }
    unique: [[title_id, similar_title_id]]
    validations:
      - { rule: "title_id != similar_title_id", message: 자기 자신은 유사작으로 지정할 수 없습니다 }

  Cast:
    table: cast_member                  # "cast" 는 SQL 예약어 — 테이블명은 cast_member 로 회피 (엔티티 클래스명은 Cast 유지)
    description: 배우 마스터 (관리자 CRUD)
    fields:
      - { name: cast_id,         type: Long,      pk: true, auto: true }
      - { name: cast_name_ko,    type: String,    required: true, label: 한글 이름 }
      - { name: cast_name_en,    type: String,    required: false, label: 영문 이름 }
      - { name: profile_file_id, type: Long,      fk: StoredFile, required: false, label: 프로필 이미지 }
      - { name: is_active,       type: Boolean,   required: true, default: true, label: 활성 여부 }
      - { name: created_at,      type: Timestamp, auto: true, audit: true }
      - { name: updated_at,      type: Timestamp, auto: true, audit: true }
    business_rules:
      - 여러 작품에 재사용 가능 (TitleCast 매핑)
      - profile_file_id 는 관리자 등록, v1 사용자 화면 비노출

  TitleCast:
    table: title_cast
    description: 작품-배우 매핑 + 역할 라벨
    fields:
      - { name: title_cast_id, type: Long,      pk: true, auto: true }
      - { name: title_id,      type: Long,      fk: Title, required: true }
      - { name: cast_id,       type: Long,      fk: Cast, required: true }
      - { name: role_label,    type: String,    required: false, label: 역할 }
      - { name: sort_order,    type: Integer,   required: true, default: 0, label: 정렬 순서 }
      - { name: created_at,    type: Timestamp, auto: true, audit: true }
      - { name: updated_at,    type: Timestamp, auto: true, audit: true }
    unique: [[title_id, cast_id]]
    business_rules:
      - role_label 은 DB 저장 + v1 사용자 화면 비노출 (나중에 노출 토글 가능)

## -------------------------------------------------------
## 3. seed_data (재생성 시 복원될 초기 데이터)
## -------------------------------------------------------
seed_data:

  Member:
    - { login_id: admin, password: admin123, member_name: 관리자, role: ADMIN }

  Section:
    - { section_key: NEW_RELEASE, display_name_ko: 업데이트 신작, display_name_en: New Releases,  sub_label: "What's new on Moyza",          sort_order: 10, is_visible: true, max_count: 20 }
    - { section_key: TRENDS,      display_name_ko: 인기작 픽,    display_name_en: Trends,        sub_label: "What's popular right now",    sort_order: 20, is_visible: true, max_count: 20 }
    - { section_key: KOREA_PICK,  display_name_ko: 코리아 픽,    display_name_en: From Korea,    sub_label: "From Korea",                  sort_order: 30, is_visible: true, max_count: 20 }

