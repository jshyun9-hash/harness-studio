<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Byul Resort — Version A</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #FBF8F2; }
  button { font-family: inherit; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#0F4C5C">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0F4C5C"/>
    <g transform="translate(600 400)" fill="none" stroke="#C8A165" stroke-width="4">
      <circle r="180"/>
      <path d="M-120 40 Q-60 -20 0 40 T120 40" stroke-width="6"/>
      <path d="M-120 80 Q-60 20 0 80 T120 80" stroke-width="6" opacity="0.6"/>
    </g>
    <text x="600" y="640" text-anchor="middle" fill="#FBF8F2" font-family="serif" font-size="56" letter-spacing="8">BYUL RESORT</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="versionA-common.jsx"></script>
<script type="text/babel" src="versionA-search.jsx"></script>
<script type="text/babel" src="versionA-home.jsx"></script>
<script type="text/babel" src="versionA-detail.jsx"></script>
<script type="text/babel" src="versionA-flow.jsx"></script>
<script type="text/babel" src="versionA-pages.jsx"></script>

<script type="text/babel">
const App = () => {
  const [screen, setScreen] = React.useState('home');
  const [roomId, setRoomId] = React.useState('ocean-suite');
  const [search, setSearch] = React.useState({
    checkIn: { day: 12, month: 4 },
    checkOut: { day: 14, month: 4 },
    adults: 2,
    children: 0,
  });

  const nav = (s) => setScreen(s);
  const selectRoom = (id) => { setRoomId(id); setScreen('detail'); };
  const book = (id) => { setRoomId(id); setScreen('booking'); };

  React.useEffect(() => { window.scrollTo(0, 0); }, [screen]);

  return (
    <>
      {screen === 'login'   && <ALogin      onNav={nav}/>}
      {screen === 'home'    && <AHome       onNav={nav} onSelectRoom={selectRoom} search={search} setSearch={setSearch}/>}
      {screen === 'rooms'   && <ARoomsList  onNav={nav} onSelectRoom={selectRoom} search={search} setSearch={setSearch}/>}
      {screen === 'notices' && <ANotices    onNav={nav}/>}
      {screen === 'detail'  && <ARoomDetail onNav={nav} roomId={roomId} onBook={book}/>}
      {screen === 'booking' && <ABooking    onNav={nav} roomId={roomId} onComplete={() => setScreen('confirm')}/>}
      {screen === 'confirm' && <AConfirm    onNav={nav} roomId={roomId}/>}
      {screen === 'mypage'  && <AMyPage     onNav={nav}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
